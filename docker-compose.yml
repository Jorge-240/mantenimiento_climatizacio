version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mantenimiento_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mantenimiento_climatizacion
      MYSQL_USER: sena
      MYSQL_PASSWORD: senapass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql

  backend:
    build: ./backend
    container_name: mantenimiento_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "mysql://sena:senapass123@mysql:3306/mantenimiento_climatizacion"
      JWT_SECRET: "tu-super-secreto-jwt-key-muy-larga-para-produccion"
      PORT: 3001
    depends_on:
      - mysql
    volumes:
      - ./backend:/app

volumes:
  mysql_data:
  
# Comandos:
# docker-compose up -d (inicia MySQL + backend)
# docker-compose logs mysql (ver logs BD)

